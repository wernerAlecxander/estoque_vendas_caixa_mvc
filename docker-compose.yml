services:
  postgres-db:
    image: postgres:17-alpine
    container_name: estoque_vendas_caixa_mvc_db
    restart: always
    mem_limit: ${POSTGRES_MEM_LIMIT:-256m}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432" #O primeiro valor (Esquerda): É a porta física que você vai digitar no navegador (no computador local ou a URL gerada pelo Codespaces). O segundo valor (Direita): É a porta em que o programa (Next.js ou Prisma) está rodando de verdade "lá dentro" do container isolado.
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./script/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  next-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estoque_vendas_caixa_mvc_app
    restart: always
    mem_limit: ${NEXT_APP_MEM_LIMIT:-512m}
    #stdin_open: true # Permite interagir com o Next.js pelo teclado
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - .:/app:cached # O cached é uma otimização para o Docker Desktop, que melhora a performance de leitura e escrita de arquivos entre o container e o host. No linux não é necessário.
      - node_modules_vol:/app/node_modules
      - next_cache_vol:/app/.next
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NODE_ENV: development
      PORT: ${PORT}
    depends_on:
      postgres-db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estoque_vendas_caixa_mvc_prisma_studio
    restart: always
    mem_limit: "${PRISMA_STUDIO_MEM_LIMIT:-256m}"
    ports:
      - "${PRISMA_STUDIO_PORT}:${PRISMA_STUDIO_PORT}"
    volumes:
      - .:/app:cached
      - node_modules_vol:/app/node_modules
      - prisma_studio_data:/app/prisma_studio_data
    environment:
      DATABASE_URL: ${DATABASE_URL}
    # Força o container a rodar o comando do studio apontando para a porta correta e escutando a rede externa
    command: pnpm prisma studio --port ${PRISMA_STUDIO_PORT} --browser none
    depends_on:
      postgres-db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  next-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estoque_vendas_caixa_mvc_test
    restart: "no"
    mem_limit: ${NEXT_APP_MEM_LIMIT:-512m}
    stdin_open: true # Permite interagir com o Vitest pelo teclado
    tty: true        # Mantém a formatação de cores do terminal
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NODE_ENV: test
    volumes:
      - .:/app
      - node_modules_vol:/app/node_modules
      - next_cache_vol:/app/.next
    command: pnpm test
    depends_on:
      postgres-db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  portainer:
    image: portainer/portainer-ce:latest
    container_name: estoque_vendas_caixa_mvc_portainer
    restart: always
    mem_limit: 128m
    profiles:
      - debug   # Vincula o Portainer ao perfil opcional "debug"
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    depends_on:
      postgres-db:
        condition: service_healthy   # Só inicia após o banco estar pronto para receber conexões
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    name: postgres_data # dá um  nome ao volume para que ele não seja deletado quando o docker compose for executado.
    #external: true # impede que o docker compose down delete o volume de dados do banco de dados
  node_modules_vol:
  next_cache_vol:
  portainer_data:
  prisma_studio_data: