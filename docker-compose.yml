services:
  postgres-db:
    image: postgres:17-alpine
    container_name: estoque_vendas_caixa_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./script/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  next-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estoque_vendas_caixa_app
    restart: always
    ports:
      - "127.0.0.1:${PORT}:${PORT}"
    volumes:
      - .:/app
      - node_modules_vol:/app/node_modules
      - next_cache_vol:/app/.next
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NODE_ENV: development
      PORT: ${PORT}
    depends_on:
      postgres-db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  node_modules_vol:
  next_cache_vol:
